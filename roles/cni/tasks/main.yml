---
# CNI: Cilium
#
# Cilium is NOT deployed by Ansible. It is managed declaratively by ArgoCD
# (GitOps) - the DaemonSet carries the annotation
# `argocd.argoproj.io/tracking-id: cilium:apps/...`.
#
# Ansible's responsibility is limited to node preparation (cleaning conflicting
# CNI bridges, ensuring /opt/cni/bin plugins exist - handled in the `common`
# role and the "Prepare CNI Environment" play in site.yml) and verifying that
# the cluster networking provided by Cilium is healthy once ArgoCD has
# reconciled it. The readiness checks live in `verify_cni.yml`.

- name: Check that Cilium is present (deployed by ArgoCD)
  ansible.builtin.shell: |
    set -o pipefail
    kubectl get daemonset -n kube-system cilium -o name 2>/dev/null || echo ""
  args:
    executable: /bin/bash
  become_user: "{{ ansible_user }}"
  become: false
  register: cni_cilium_daemonset_exists
  retries: 30
  delay: 10
  until: cni_cilium_daemonset_exists.stdout != ""
  changed_when: false
  failed_when: false

- name: Warn if Cilium has not been deployed yet
  ansible.builtin.debug:
    msg: >-
      Cilium DaemonSet not found in kube-system. Cilium is managed by ArgoCD
      (GitOps), not by this playbook. Ensure the ArgoCD 'cilium' application is
      synced before relying on cluster networking.
  when: cni_cilium_daemonset_exists.stdout == ""

- name: Verify Cilium readiness and cluster networking
  ansible.builtin.include_tasks: verify_cni.yml

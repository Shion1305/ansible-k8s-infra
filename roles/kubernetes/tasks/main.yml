---
- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Kubernetes APT repository signing key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_apt_channel }}/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring-armored.key
    mode: "0644"

- name: Dearmor Kubernetes APT repository signing key
  ansible.builtin.command:
    cmd: gpg --batch --yes --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /etc/apt/keyrings/kubernetes-apt-keyring-armored.key
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Ensure Kubernetes APT keyring permissions are deterministic
  ansible.builtin.file:
    path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    mode: "0644"
    owner: root
    group: root

# apt_repository has no lock_timeout, so don't let it refresh the cache (that is
# the step that collides with unattended-upgrades). Add the repo only, then run a
# dedicated lock-tolerant cache update below.
- name: Add Kubernetes APT repository with signed-by
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/{{ kubernetes_apt_channel }}/deb/ /"
    filename: kubernetes
    state: present
    update_cache: false
  register: kubernetes_apt_repo
  until: kubernetes_apt_repo is succeeded
  retries: 3
  delay: 10

- name: Refresh apt cache after adding the Kubernetes repository
  ansible.builtin.apt:
    update_cache: true
    lock_timeout: "{{ apt_lock_timeout | default(300) }}"
  register: kubernetes_apt_cache
  until: kubernetes_apt_cache is succeeded
  retries: 3
  delay: 10

- name: Install containerd
  ansible.builtin.apt:
    name: containerd
    state: present
    lock_timeout: "{{ apt_lock_timeout | default(300) }}"

- name: Create containerd configuration directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate containerd configuration
  ansible.builtin.command: containerd config default
  register: kubernetes_containerd_config
  changed_when: false

- name: Modify containerd configuration (enable systemd cgroups)
  ansible.builtin.set_fact:
    kubernetes_containerd_config_modified: "{{ kubernetes_containerd_config.stdout | regex_replace('SystemdCgroup = false', 'SystemdCgroup = true') }}"

- name: Write containerd configuration
  ansible.builtin.copy:
    content: "{{ kubernetes_containerd_config_modified }}"
    dest: /etc/containerd/config.toml
    mode: "0644"
    owner: root
    group: root
    backup: true
  register: kubernetes_containerd_config_written
  changed_when: kubernetes_containerd_config_written.diff | default([]) | length > 0
  notify: Restart containerd

- name: Install Kubernetes packages
  ansible.builtin.apt:
    name:
      - kubelet={{ kubernetes_version }}
      - kubeadm={{ kubernetes_version }}
      - kubectl={{ kubernetes_version }}
    state: present
    lock_timeout: "{{ apt_lock_timeout | default(300) }}"

- name: Hold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Configure kubelet extra args (node IP + resource reservations)
  ansible.builtin.lineinfile:
    path: /etc/default/kubelet
    regexp: "^KUBELET_EXTRA_ARGS="
    line: >-
      KUBELET_EXTRA_ARGS="{{
        (['--node-ip=' + wireguard_ip]
          + (['--kube-reserved=' + kubelet_kube_reserved] if (kubelet_kube_reserved | default('')) else [])
          + (['--system-reserved=' + kubelet_system_reserved] if (kubelet_system_reserved | default('')) else [])
          + (['--eviction-hard=' + kubelet_eviction_hard] if (kubelet_eviction_hard | default('')) else [])
        ) | join(' ')
      }}"
    mode: "0644"
    owner: root
    group: root
    create: true
  notify: Restart kubelet

- name: Enable and start services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - containerd
    - kubelet

---
# containerd restarts only when its config.toml actually changed (the notifying
# task sets changed_when on a real diff), so this is safe to run unattended —
# no interactive prompt, which would otherwise hang non-interactive `just deploy`.
- name: Restart containerd
  ansible.builtin.systemd:
    name: containerd
    state: restarted

- name: Restart kubelet
  ansible.builtin.systemd:
    name: kubelet
    state: restarted

---
all:
  children:
    control_plane:
      hosts:
        k8s:
          ansible_host: k8s.shion1305.com
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/credentials/shion1305-oci
          wireguard_ip: 10.130.5.1
          wireguard_zone: oci
          architecture: arm64
          wireguard_interface: wg0
          wireguard_port: 51820
          cni_version: v1.3.0
          # 2 vCPU / 12Gi: memory-only reservation (avoid reserving scarce CPU)
          kubelet_kube_reserved: "memory=512Mi"
          kubelet_system_reserved: "memory=512Mi"
          kubelet_eviction_hard: "memory.available<500Mi,nodefs.available<10%,imagefs.available<15%"

    workers:
      hosts:
        cm4:
          ansible_host: cm4
          ansible_user: shion
          ansible_ssh_private_key_file: ~/.ssh/credentials/rasp-cm4
          wireguard_ip: 10.130.5.65
          wireguard_zone: home-static
          architecture: arm64
          wireguard_interface: wg0
          cni_version: v1.3.0
          has_ufw: true
          # 4 vCPU / 8Gi: light reservation
          kubelet_kube_reserved: "cpu=250m,memory=512Mi"
          kubelet_system_reserved: "cpu=250m,memory=512Mi"
          kubelet_eviction_hard: "memory.available<300Mi,nodefs.available<10%,imagefs.available<15%"

        s2204:
          ansible_host: s2204
          ansible_user: shion
          ansible_ssh_private_key_file: ~/.ssh/credentials/shion1305
          wireguard_ip: 10.130.5.66
          wireguard_zone: home-static
          architecture: amd64
          wireguard_interface: wg0
          cni_version: v1.3.0
          has_ufw: true
          # 20 vCPU / 32Gi: reservation already applied on this node
          kubelet_kube_reserved: "cpu=500m,memory=1Gi"
          kubelet_system_reserved: "cpu=500m,memory=1Gi"
          kubelet_eviction_hard: "memory.available<500Mi,nodefs.available<10%,imagefs.available<15%"

        k8s-proxy:
          ansible_host: prox
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/credentials/shion1305-oci
          wireguard_ip: 10.130.5.2
          wireguard_zone: oci
          architecture: arm64
          wireguard_interface: wg0
          cni_version: v1.3.0
          has_ufw: true
          # 2 vCPU / 12Gi: memory-only reservation (avoid reserving scarce CPU)
          kubelet_kube_reserved: "memory=512Mi"
          kubelet_system_reserved: "memory=512Mi"
          kubelet_eviction_hard: "memory.available<500Mi,nodefs.available<10%,imagefs.available<15%"

  vars:
    # Kubernetes configuration
    kubernetes_version: "1.35.5-1.1"
    # apt repo channel (minor) derived from kubernetes_version, e.g. "v1.35".
    # Bumping kubernetes_version is enough; the channel follows automatically.
    kubernetes_apt_channel: "v{{ kubernetes_version.split('.')[0] }}.{{ kubernetes_version.split('.')[1] }}"
    pod_network_cidr: "10.244.0.0/16"
    service_cidr: "10.96.0.0/12"

    # kubelet resource reservations (defaults: none; override per host above).
    # Empty string => the corresponding kubelet flag is omitted.
    # NOTE: --eviction-hard, when set, replaces ALL eviction thresholds, so the
    # per-host string keeps the nodefs/imagefs defaults (10%/15%) alongside memory.
    kubelet_kube_reserved: ""
    kubelet_system_reserved: ""
    kubelet_eviction_hard: ""

    # WireGuard network
    wireguard_network: "10.130.5.0/24"

    # WireGuard overlay addressing plan. Every host and static peer MUST declare a
    # `wireguard_zone`; the IP it is assigned MUST fall inside that zone's CIDR.
    # CI (tests/test_inventory_zones.py) enforces this and fails on a missing
    # attribute, a zone/IP mismatch, an out-of-overlay IP, or a duplicate IP.
    # Unassigned blocks (room to grow): .8/29, .16/28, .32/27, .112/28,
    # .160/27, .192/26.
    wireguard_zones:
      oci: "10.130.5.0/29"               # cloud nodes (control plane, k8s-proxy)
      home-static: "10.130.5.64/27"      # always-on home machines (k8s workers)
      owned-mobile: "10.130.5.96/28"     # my own roaming devices (laptops/phones)
      external-static: "10.130.5.128/28" # other people's always-on hosts
      external-mobile: "10.130.5.144/28" # other people's roaming devices

    # Static WireGuard peers (non-Kubernetes nodes).
    # `zone` is required and its CIDR must contain `allowed_ips` (CI-enforced).
    # NOTE: renumbering a static peer also requires updating that device's own
    # wg config `Address` to match -- they are not managed by this repo.
    wireguard_static_peers:
      mac-m4-max:
        public_key: "nP4kEiL1SQHb3emQlqit43UzroOYa+PZGtsBxJQbaFM="
        allowed_ips: "10.130.5.97/32"
        zone: owned-mobile

      tomoya-mac:
        public_key: "+6KaWGZ4ePBZPhQJhGrMK4qU837OzXvNe86nntx1kno="
        allowed_ips: "10.130.5.145/32"
        zone: external-mobile

    # Control plane endpoint
    control_plane_endpoint: "k8s.shion1305.com:6443"
    apiserver_advertise_address: "10.130.5.1"

    # Container runtime
    containerd_version: "1.7.27-*"

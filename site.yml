---
# Kubernetes Cluster with WireGuard Overlay Network
# Main deployment playbook

- name: Setup Common Prerequisites
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    # The canonical Kubernetes APT source is /etc/apt/sources.list.d/kubernetes.list
    # (managed by the kubernetes role via `filename: kubernetes`). Remove any
    # stray version-named or backup files so they can't pin an old channel or
    # cause Signed-By conflicts. Version-agnostic: no per-upgrade maintenance.
    - name: Find stray legacy Kubernetes APT source files
      ansible.builtin.find:
        paths: /etc/apt/sources.list.d
        patterns:
          - "pkgs_k8s_io_core_stable_v1_*_deb.list"
          - "kubernetes.list.*"
      register: stray_k8s_sources

    - name: Remove stray legacy Kubernetes APT sources (keep canonical kubernetes.list)
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ stray_k8s_sources.files }}"
      loop_control:
        label: "{{ item.path }}"

    # Unattended-upgrades / apt-daily timers hold the dpkg lock on these hosts.
    # Wait for it to clear (fuser returns rc=0 while held) so the apt tasks below
    # don't fail outright. Degrades gracefully to "no wait" if fuser is absent.
    - name: Wait for the apt/dpkg lock to be released
      ansible.builtin.shell: fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1
      register: site_dpkg_lock
      until: site_dpkg_lock.rc != 0
      retries: 30
      delay: 10
      changed_when: false
      failed_when: false
      when: ansible_os_family == "Debian"

    - name: Update apt cache (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: "{{ apt_lock_timeout | default(300) }}"
      register: site_apt_cache
      until: site_apt_cache is succeeded
      retries: 3
      delay: 10
      when: ansible_os_family == "Debian" # Ubuntu is part of Debian family

    - name: Ensure required directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop: # Ensure these directories exist on all nodes
        - /opt/cni/bin
        - /etc/wireguard
        - /etc/kubernetes

  roles:
    - common
    - kubernetes

- name: Generate WireGuard Keys
  hosts: all
  become: true
  gather_facts: false
  tags: wireguard

  tasks:
    - name: Install WireGuard
      ansible.builtin.package:
        name:
          - wireguard
          - wireguard-tools
        state: present

    # Generate the keypair once, persist it, and load it into facts. Keys are no
    # longer regenerated every run, so wg0.conf renders identically on a
    # steady-state deploy and the tunnel is not restarted needlessly.
    - name: Ensure a persisted WireGuard keypair exists and load it
      ansible.builtin.include_tasks: roles/wireguard/tasks/ensure_keys.yml

- name: Configure WireGuard
  hosts: all
  become: true
  gather_facts: false
  tags: wireguard

  tasks:
    # Incremental peer configuration for control plane
    - name: Fetch existing WireGuard peer state on control plane
      ansible.builtin.include_tasks: roles/wireguard/tasks/fetch_existing_peers.yml
      when: inventory_hostname in groups['control_plane']

    - name: Merge peer configurations on control plane
      ansible.builtin.include_tasks: roles/wireguard/tasks/merge_peer_config.yml
      when: inventory_hostname in groups['control_plane']

    # Dry-run mode: Generate config to temp location and show diff
    - name: Generate WireGuard configuration preview (dry-run mode)
      ansible.builtin.include_tasks: roles/wireguard/tasks/dry_run_config.yml
      when: wireguard_dry_run | default(false) | bool

    # Normal mode: Apply configuration
    - name: Create WireGuard configuration
      ansible.builtin.template:
        src: "roles/wireguard/templates/{{ wireguard_interface }}.conf.j2"
        dest: "/etc/wireguard/{{ wireguard_interface }}.conf"
        mode: "0600"
        backup: true
      notify: Restart WireGuard
      when: not (wireguard_dry_run | default(false) | bool)

    - name: Enable and start WireGuard service
      ansible.builtin.systemd:
        name: "wg-quick@{{ wireguard_interface }}"
        enabled: true
        state: started
      when: not (wireguard_dry_run | default(false) | bool)

    # UFW policy is driven by roles/firewall (rules come from the port lists in
    # group_vars/all.yml). Runs on all hosts; the role branches per group.
    - name: Configure host firewall (UFW)
      ansible.builtin.include_role:
        name: firewall

    # Flush handlers to ensure WireGuard service is restarted with new config
    - name: Flush handlers to apply WireGuard configuration
      ansible.builtin.meta: flush_handlers

    # Validate WireGuard peer configuration
    - name: Validate WireGuard peer configuration on control plane
      ansible.builtin.include_tasks: roles/wireguard/tasks/validate_peers.yml
      when:
        - inventory_hostname in groups['control_plane']
        - not (wireguard_dry_run | default(false) | bool)

  handlers:
    - name: Restart WireGuard
      ansible.builtin.systemd:
        name: "wg-quick@{{ wireguard_interface }}"
        state: restarted

- name: Initialize Control Plane
  hosts: control_plane
  become: true
  gather_facts: false

  roles:
    - control_plane

- name: Join Worker Nodes
  hosts: workers
  become: true
  gather_facts: false

  roles:
    - worker

- name: Prepare CNI Environment
  hosts: workers
  become: true
  gather_facts: false

  tasks:
    - name: Remove old CNI bridge interfaces that might conflict
      ansible.builtin.include_tasks: roles/worker/tasks/clean_cni_bridges.yml

- name: Verify Deployment
  hosts: control_plane
  become: true
  gather_facts: false

  tasks:
    - name: Verify node status
      ansible.builtin.command: kubectl get nodes -o wide
      register: node_status
      become: true
      become_user: "{{ ansible_user }}"
      changed_when: false

    - name: Display cluster status
      ansible.builtin.debug:
        msg: "{{ node_status.stdout_lines }}"
